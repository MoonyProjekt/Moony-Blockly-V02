<svg xmlns="http://www.w3.org/2000/svg" width="80" height="180" viewBox="0 0 80 180">

  <!-- Servo body -->
  <rect x="14" y="10" width="52" height="140" rx="8" fill="#2C86C8" stroke="#1E5A8A" stroke-width="4"></rect>

  <!-- Inner gear -->
  <circle cx="40" cy="70" r="26" fill="#4FA3E3"></circle>
  <circle cx="40" cy="70" r="20" fill="none" stroke="#2C86C8" stroke-width="4"></circle>

  <!-- Servo horn -->
  <rect x="36" y="30" width="8" height="80" rx="4" fill="#F2F2F2" stroke="#666" stroke-width="2"></rect>
  <rect x="16" y="66" width="48" height="8" rx="4" fill="#F2F2F2" stroke="#666" stroke-width="2"></rect>

  <!-- Horn holes -->
  <g fill="#3A3A3A">
    <circle cx="40" cy="38" r="2"></circle>
    <circle cx="40" cy="50" r="2"></circle>
    <circle cx="40" cy="62" r="2"></circle>
    <circle cx="40" cy="78" r="2"></circle>
    <circle cx="40" cy="90" r="2"></circle>
    <circle cx="40" cy="102" r="2"></circle>
  </g>

  <!-- Center hub -->
  <circle cx="40" cy="70" r="10" fill="#E6E6E6" stroke="#777" stroke-width="2"></circle>
  <line x1="36" y1="70" x2="44" y2="70" stroke="#777" stroke-width="2"></line>
  <line x1="40" y1="66" x2="40" y2="74" stroke="#777" stroke-width="2"></line>

  <!-- 360° rotation -->
  <path d="M40 26 A18 18 0 1 1 39.9 26" fill="none" stroke="#FFFFFF" stroke-width="4"></path>
  <polygon points="40,20 46,30 34,30" fill="#FFFFFF"></polygon>

  <!-- Label -->
  <text x="40" y="168" text-anchor="middle" font-family="system-ui,Segoe UI,Arial" font-size="14" fill="#1E5A8A">360°</text>
</svg>
