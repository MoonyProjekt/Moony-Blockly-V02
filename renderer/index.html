<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moony Blockly</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <!-- 🔷 Kopfbereich -->
  <header class="topbar">
    <div class="logo-container">
      <img id="moony-logo" src="img/Moony Blockly w.png" alt="Moony Logo" class="logo" />
    </div>

    <div class="button-bar">
      <button id="btn-new" title="Neu">🆕</button>
      <button id="btn-open" title="Öffnen">📂</button>
      <button id="btn-save" title="Speichern">💾</button>
      <button id="btn-undo" title="Rückgängig">↩️</button>
      <button id="btn-redo" title="Wiederholen">↪️</button>

      <label class="switch" title="Zwischen Blöcken und Code umschalten">
        <input type="checkbox" id="toggle-view" />
        <span class="slider"></span>
        <span class="switch-icons">
          <span class="icon-block">🧱</span>
          <span class="icon-code">💻</span>
        </span>
      </label>

      <button id="btn-connect" title="Arduino verbinden">🔌</button>

      <select id="board-select">
        <option value="uno" selected>Arduino UNO</option>
        <option value="nano-new">Arduino Nano (neu)</option>
        <option value="nano-old">Arduino Nano (alter Bootloader)</option>
        <option value="mega">Arduino Mega</option>
        <option value="leonardo">Arduino Leonardo</option>
      </select>

      <button id="btn-upload" title="Code hochladen">🚀</button>
    </div>
  </header>

  <main>
    <div id="blocklyDiv"></div>
    <pre id="codeView"></pre>
  </main>

  <!-- 🧰 TOOLBOX -->
  <xml id="toolbox" style="display:none">

    <category name="Start" categorystyle="start_category">
      <block type="program_start_once"></block>
      <block type="program_start_forever"></block>
    </category>

    <category name="Logik" categorystyle="logic_category">
      <block type="moony_if_simple"></block>
      <block type="moony_if"></block>
      <block type="moony_compare"></block>
      <block type="moony_logic_op"></block>
      <block type="moony_not"></block>
      <block type="moony_boolean"></block>
    </category>

    <category name="Schleifen" categorystyle="loop_category">
      <block type="program_loop_forever"></block>

      <block type="moony_repeat">
        <value name="TIMES">
          <shadow type="math_number">
            <field name="NUM">5</field>
          </shadow>
        </value>
      </block>

      <block type="moony_while"></block>

      <block type="moony_for">
        <value name="FROM">
          <shadow type="math_number">
            <field name="NUM">0</field>
          </shadow>
        </value>
        <value name="TO">
          <shadow type="math_number">
            <field name="NUM">10</field>
          </shadow>
        </value>
        <value name="STEP">
          <shadow type="math_number">
            <field name="NUM">1</field>
          </shadow>
        </value>
      </block>

      <block type="moony_loop_break"></block>
      <block type="moony_loop_continue"></block>
    </category>

    <category name="Mathe" categorystyle="math_category">
      <block type="math_number"></block>
      <block type="moony_math_arithmetic"></block>
    </category>

    <category name="Text" categorystyle="text_category">
      <block type="moony_text"></block>
      <block type="moony_text_print"></block>
    </category>

    <category name="Bewegung" categorystyle="movement_category">
      <block type="motor_stop"></block>
      <block type="motor_a_control"></block>
      <block type="motor_b_control"></block>
      <block type="vehicle_run_both_timed"></block>
    </category>

    <category name="Servos" categorystyle="servo_category">
      <block type="servo_set_angle"></block>
      <block type="servo_continuous"></block>
      <block type="servo_slow_move"></block>
      <block type="servo_init_center"></block>
      <block type="servo_360_calibrate"></block>
      <block type="servo_detach"></block>
    </category>

    <category name="Zeit" categorystyle="time_category">
      <block type="time_wait"></block>
      <block type="time_loop"></block>
      <block type="time_wait_until"></block>
    </category>

    <category name="Sensoren" categorystyle="sensor_category">
      <block type="sensor_hcsr04_distance"></block>
      <block type="sensor_vl53l0x_init"></block>
      <block type="sensor_vl53l0x_mode"></block>
      <block type="sensor_vl53l0x_calib"></block>
      <block type="sensor_vl53l0x_calib_reset"></block>
      <block type="sensor_vl53l0x_distance"></block>
      <block type="sensor_button_pressed"></block>
      <block type="sensor_switch_on"></block>

      <block type="sensor_soil_analog_raw"></block>
      <block type="sensor_soil_analog_percent"></block>
      <block type="sensor_soil_is_dry"></block>
    </category>

    <category name="Sound & Musik" categorystyle="sound_category">
      <block type="sound_beep"></block>
      <block type="sound_beep_pattern"></block>
      <block type="sound_signal"></block>

      <sep></sep>

      <block type="sound_music_play_blocking"></block>
      <block type="sound_music_custom_blocking"></block>

      <sep></sep>

      <block type="sound_music_start"></block>
      <block type="sound_music_custom_start"></block>
      <block type="sound_music_update"></block>
      <block type="sound_music_stop"></block>
      <block type="sound_music_loop"></block>
      <block type="sound_music_is_running"></block>
    </category>

    <category name="Licht" categorystyle="led_category">
      <block type="led_set"></block>
      <sep></sep>
      <block type="matrix8x8_init_max7219"></block>
      <block type="matrix8x8_clear"></block>
      <block type="matrix8x8_icon"></block>
      <block type="matrix8x8_set_pixel"></block>
      <block type="matrix8x8_draw_custom"></block>
      <block type="matrix8x8_scroll_text"></block>
      <sep></sep>
      <block type="ws2812_ring_init"></block>
      <block type="ws2812_ring_set_pixel"></block>
      <block type="ws2812_ring_fill"></block>
      <block type="ws2812_ring_clear"></block>
      <block type="ws2812_ring_show"></block>
      <block type="ws2812_ring_rainbow"></block>
    </category>

    <category name="Animationen" categorystyle="animation_category">
      <block type="animation_eyes_init"></block>
      <block type="animation_eyes_icon"></block>
      <block type="animation_eyes_look"></block>
      <block type="animation_eyes_blink"></block>
      <block type="animation_clear"></block>
    </category>

<category name="Kommunikation" categorystyle="communication_category">
  <block type="comm_radio_start"></block>
  <block type="comm_radio_send_data"></block>
  <block type="comm_radio_available"></block>
  <block type="comm_radio_read_data"></block>
</category>


    <sep></sep>
    <category name="Variablen" custom="VARIABLE" categorystyle="math_category"></category>
    <category name="Funktionen" custom="PROCEDURE" categorystyle="logic_category"></category>

  </xml>

  <!-- Blockly Core -->
  <script src="libs/blockly/blockly_compressed.js"></script>
  <script src="libs/blockly/blocks_compressed.js"></script>
  <script src="libs/blockly/msg/de.js"></script>

  <!-- Theme & Generator -->
  <script src="js/theme.js"></script>
  <script src="js/arduino.js"></script>

  <!-- Eigene Blöcke -->
  <script src="js/blocks_movement.js"></script>
  <script src="js/blocks_servo.js"></script>
  <script src="js/blocks_time.js"></script>
  <script src="js/blocks_start.js"></script>
  <script src="js/blocks_loop.js"></script>
  <script src="js/blocks_logic.js"></script>
  <script src="js/blocks_math.js"></script>
  <script src="js/blocks_text.js"></script>
  <script src="js/blocks_sensor.js"></script>
  <script src="js/blocks_sound.js"></script>
  <script src="js/blocks_led.js"></script>
  <script src="js/blocks_animation.js"></script>
<script src="js/blocks_communication.js"></script>

  <script src="js/main.js"></script>
</body>
</html>
