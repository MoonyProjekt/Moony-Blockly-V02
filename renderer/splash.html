<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moony Blockly</title>

<style>
/* 🔒 Absolute Sicherheit gegen Scrollbars */
* {
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden !important;   /* 🔴 zwingend */
  background: #0b1224;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

/* 🧩 Fixe Inhaltsbox – KANN NICHT ÜBERLAUFEN */
.container {
  width: 100%;
  height: 100%;
  max-width: 640px;
  max-height: 420px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  overflow: hidden;              /* 🔴 doppelt gesichert */
}

/* 🖼️ Logo – streng begrenzt */
.logo {
  max-width: 480px;              /* 🔧 HIER steuerst du die Größe */
  max-height: 180px;
  width: auto;
  height: auto;
  display: block;
  object-fit: contain;
}

/* 📝 Text */
.text {
  font-size: 14px;
  color: rgba(233,225,190,0.85);
  letter-spacing: 0.4px;
}

/* ⏳ Ladebalken */
.bar {
  width: 220px;
  height: 6px;
  border-radius: 999px;
  background: rgba(233,225,190,0.25);
  overflow: hidden;
}

.bar > div {
  width: 40%;
  height: 100%;
  background: rgba(154,194,47,0.9);
  border-radius: 999px;
  animation: slide 1.2s ease-in-out infinite;
}

@keyframes slide {
  0%   { transform: translateX(-120%); }
  50%  { transform: translateX(80%); }
  100% { transform: translateX(240%); }
}
</style>
</head>

<body>
  <div class="container">
    <img class="logo" src="img/Moony Blockly w.png" alt="Moony Blockly">
    <div class="text">Moony Blockly wird gestartet …</div>
    <div class="bar"><div></div></div>
  </div>
</body>
</html>
